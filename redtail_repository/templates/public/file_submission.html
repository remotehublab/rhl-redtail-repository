{% extends "public/_base.html" %}

{% block container %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8"> <div class="card">
        <div class="card-header">
          {{ gettext("Upload Laboratory Exercise Document") }}
        </div>

        <div class="card-body">

          {% if error %}
          <div class="alert alert-danger">
            {{ error }}
          </div>
          {% endif %}

          {% if success %}
          <div class="alert alert-success">
            {{ success }}
          </div>
          {% endif %}

          <form method="POST" enctype="multipart/form-data">
            
            <div class="mb-3">
              <label class="form-label fw-bold">{{ gettext("Related Laboratory Exercise") }}</label>
              <select name="laboratory_exercise_id" class="form-select" required>
                <option value="" disabled selected>{{ gettext("Select an exercise...") }}</option>
                {% for exercise in exercises %}
                  <option value="{{ exercise.id }}">{{ exercise.name }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">{{ gettext("Document Title") }}</label>
              <input type="text" name="title" class="form-control" placeholder="e.g., Week 1 Lab Instructions" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">{{ gettext("Description (Optional)") }}</label>
              <textarea name="description" class="form-control" rows="3" placeholder="Briefly describe the contents of this document..."></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">{{ gettext("Select File (.pdf, .docx, .md, .txt)") }}</label>
              <input type="file" name="file" class="form-control" accept=".pdf,.docx,.md,.txt" required>
            </div>

            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" name="is_solution" id="isSolutionCheck">
              <label class="form-check-label" for="isSolutionCheck">
                {{ gettext("Mark as a Solution Document") }}
              </label>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              {{ gettext("Upload Document") }}
            </button>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
