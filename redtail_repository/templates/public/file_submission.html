{% extends "public/_base.html" %}

{% block container %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-10">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">{{ gettext("Upload Document & Update Exercise") }}</h5>
        </div>

        <div class="card-body">
          <form method="POST" enctype="multipart/form-data">
            <div class="mb-4 p-3 bg-light border rounded">
              <label class="form-label fw-bold">{{ gettext("What is this document for?") }}</label>
              <select name="target_type" id="targetType" class="form-select" onchange="toggleTargetSections()" required>
                <option value="exercise" selected>{{ gettext("Laboratory Exercise") }}</option>
                <option value="simulation">{{ gettext("Simulation") }}</option>
              </select>
            </div>

            <div id="exerciseSection">
              <div class="mb-3" id="existingExerciseDropdown">
                <label class="form-label fw-bold">{{ gettext("Select Existing Exercise") }}</label>
                <select name="laboratory_exercise_id" id="labSelect" class="form-select">
                  <option value="" disabled selected>{{ gettext("Select an exercise...") }}</option>
                  {% for exercise in exercises %}
                  <option value="{{ exercise.id }}">{{ exercise.name }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="d-flex gap-3 mb-4 border-bottom pb-3">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="exercise_mode" value="existing" id="modeExisting" checked onchange="toggleNewExerciseForm()">
                  <label class="form-check-label" for="modeExisting">{{ gettext("Update Existing") }}</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="exercise_mode" value="new" id="modeNew" onchange="toggleNewExerciseForm()">
                  <label class="form-check-label fw-bold text-success" for="modeNew">{{ gettext("+ Create New") }}</label>
                </div>
              </div>

              <div class="mb-4 p-3 border rounded bg-light">
                <label class="form-label fw-bold">{{ gettext("Exercise Cover Image") }}</label>
                <small class="text-muted d-block mb-2">{{ gettext("Upload a file here to set or replace the current cover image.") }}</small>
                <input type="file" name="new_exercise_cover" class="form-control" accept="image/*">
              </div>

              <div id="newExerciseMegaForm" class="mb-4 p-4 border border-success rounded" style="display: none;">
                </div>
            </div>

            <hr>

            <h5 class="mt-4 mb-3">{{ gettext("Document / Handout") }}</h5>

            <div class="mb-3" id="replaceHandoutGroup">
                <label class="form-label fw-bold">{{ gettext("Action") }}</label>
                <select name="replace_doc_id" class="form-select">
                    <option value="">{{ gettext("-- Add as New Handout --") }}</option>
                    </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">{{ gettext("Document Title") }}</label>
              <input type="text" name="title" class="form-control" required>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">{{ gettext("Select File") }}</label>
              <input type="file" name="file" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">{{ gettext("Apply Changes") }}</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function toggleNewExerciseForm() {
    const isNew = document.getElementById('modeNew').checked;
    document.getElementById('newExerciseMegaForm').style.display = isNew ? 'block' : 'none';
    document.getElementById('existingExerciseDropdown').style.display = isNew ? 'none' : 'block';
    document.getElementById('replaceHandoutGroup').style.display = isNew ? 'none' : 'block';
  }
</script>
{% endblock %}
